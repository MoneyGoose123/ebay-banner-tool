<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay Banner Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .drop-zone {
      border: 2px dashed #c0c8d8;
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafbfc;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #e53e3e;
      background: #fff5f5;
    }

    .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }

    .drop-zone p {
      color: #555;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .drop-zone span {
      color: #999;
      font-size: 13px;
    }

    #file-input { display: none; }

    .preview-wrap {
      display: none;
      margin-top: 20px;
      text-align: center;
    }

    .preview-wrap img {
      max-width: 100%;
      max-height: 240px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .file-name {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #e53e3e;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #c53030; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .loading {
      display: none;
      text-align: center;
      margin-top: 16px;
      color: #666;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ddd;
      border-top-color: #e53e3e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .banner-preview {
      margin-top: 24px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #eee;
    }

    .banner-preview img { width: 100%; display: block; }

    .banner-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>eBay Banner Tool</h1>
    <p class="subtitle">商品写真をアップロードするだけでバナーを自動追加します</p>

    <div class="drop-zone" id="drop-zone">
      <div class="icon">🖼️</div>
      <p>写真をドラッグ＆ドロップ</p>
      <span>または クリックして選択（JPG / PNG）</span>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="preview-wrap" id="preview-wrap">
      <img id="preview-img" src="" alt="プレビュー">
      <div class="file-name" id="file-name"></div>
    </div>

    <button class="btn" id="submit-btn" disabled>バナーを追加してダウンロード</button>

    <div class="loading" id="loading">
      <span class="spinner"></span>処理中...
    </div>

    <div style="margin-top: 28px;">
      <div class="banner-label">追加されるバナー</div>
      <div class="banner-preview">
        <img src="/static/banner.png" alt="バナー">
      </div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg = document.getElementById('preview-img');
    const fileName = document.getElementById('file-name');
    const submitBtn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) setFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewWrap.style.display = 'block';
        fileName.textContent = file.name;
        submitBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      submitBtn.disabled = true;
      loading.style.display = 'block';

      const formData = new FormData();
      formData.append('image', selectedFile);

      try {
        const res = await fetch('/process', { method: 'POST', body: formData });
        if (!res.ok) throw new Error('処理失敗');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ebay_listing.jpg';
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('エラーが発生しました。もう一度試してください。');
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
