<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鵜澤スペシャル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1a73e8;
      --blue-light: #e8f0fe;
      --green: #1e8e3e;
      --green-light: #e6f4ea;
      --red: #d93025;
      --surface: #ffffff;
      --bg: #f8f9fa;
      --border: #e0e0e0;
      --text: #202124;
      --text-2: #5f6368;
      --text-3: #9aa0a6;
      --shadow-sm: 0 1px 3px rgba(60,64,67,.12), 0 1px 2px rgba(60,64,67,.08);
      --shadow-md: 0 2px 6px rgba(60,64,67,.12), 0 1px 4px rgba(60,64,67,.08);
      --shadow-lg: 0 4px 12px rgba(60,64,67,.15), 0 2px 6px rgba(60,64,67,.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      width: 32px; height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .topbar-chip {
      margin-left: 4px;
      font-size: 11px;
      font-weight: 600;
      background: var(--blue-light);
      color: var(--blue);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      min-height: calc(100vh - 64px);
    }

    /* ── Left Panel ── */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      height: calc(100vh - 64px);
      position: sticky;
      top: 64px;
    }

    /* ── Section ── */
    .section {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .section.done { border-color: #b7d7be; }

    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .section.done .section-head { background: var(--green-light); border-color: #b7d7be; }

    .step-badge {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--text-3);
      color: white;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .section.done .step-badge { background: var(--green); }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .section-done-label {
      margin-left: auto;
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
      display: none;
    }
    .section.done .section-done-label { display: block; }

    .section-body { padding: 16px; }

    /* ── Drop Zone ── */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--bg);
    }
    .drop-zone:hover { border-color: var(--blue); background: var(--blue-light); }
    .drop-zone.drag-over { border-color: var(--blue); background: var(--blue-light); }
    .drop-zone .dz-icon { font-size: 28px; margin-bottom: 8px; }
    .drop-zone .dz-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .drop-zone .dz-sub { font-size: 12px; color: var(--text-3); }

    /* ── File Chip ── */
    .file-chip {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--green-light);
      border: 1px solid #b7d7be;
      border-radius: var(--radius-sm);
    }
    .file-chip img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .file-chip .fc-info { flex: 1; min-width: 0; }
    .file-chip .fc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-chip .fc-size { font-size: 11px; color: var(--text-2); margin-top: 1px; }
    .file-chip .fc-change {
      font-size: 12px; font-weight: 600; color: var(--blue);
      background: none; border: none; cursor: pointer; flex-shrink: 0; padding: 4px 8px;
    }
    .file-chip .fc-change:hover { text-decoration: underline; }

    /* ── Banner Cards ── */
    .banner-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .banner-opt {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .banner-opt:hover { border-color: var(--blue); }
    .banner-opt.selected { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }

    .banner-opt .bo-check {
      position: absolute; top: 6px; right: 6px;
      width: 20px; height: 20px;
      background: var(--blue);
      border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      color: white; font-size: 11px; font-weight: bold;
      box-shadow: var(--shadow-sm);
    }
    .banner-opt.selected .bo-check { display: flex; }

    .banner-opt img { width: 100%; height: 60px; object-fit: cover; display: block; }

    .banner-opt .custom-ph {
      height: 60px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      gap: 4px;
    }
    .banner-opt .custom-ph .ph-icon { font-size: 20px; color: var(--text-3); }
    .banner-opt .custom-ph span { font-size: 11px; color: var(--text-3); font-weight: 500; }

    .banner-opt .bo-label {
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .banner-opt.selected .bo-label { color: var(--blue); }

    /* ── Slider ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .slider-label { font-size: 13px; color: var(--text-2); flex: 1; }
    .slider-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
      min-width: 52px;
      text-align: right;
      line-height: 1;
    }
    .slider-num small { font-size: 13px; font-weight: 500; }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--blue) 0%, var(--blue) var(--pct), var(--border) var(--pct), var(--border) 100%);
      outline: none;
      margin-bottom: 8px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--blue);
      cursor: pointer;
      box-shadow: var(--shadow-md);
    }
    .slider-ticks { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); }

    /* ── Right: Preview ── */
    .preview-area {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-title-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
    }
    .live-dot::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #34a853;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .preview-box {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }

    .preview-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--text-3);
    }
    .preview-empty-state .es-icon {
      width: 64px; height: 64px;
      background: var(--bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .preview-empty-state p { font-size: 14px; font-weight: 500; }
    .preview-empty-state span { font-size: 13px; color: var(--text-3); }

    #preview-canvas { width: 100%; height: 100%; display: none; object-fit: contain; }

    /* ── Download Button ── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--blue);
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1px;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1557b0;
      box-shadow: 0 2px 8px rgba(26,115,232,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:disabled { background: var(--border); color: var(--text-3); cursor: not-allowed; transform: none; box-shadow: none; }

    .loading { display: none; text-align: center; font-size: 13px; color: var(--text-3); max-width: 520px; width: 100%; margin: 0 auto; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    input[type=file] { display: none; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      .panel { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .preview-area { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-logo">🏷️</div>
    <span class="topbar-title">鵜澤スペシャル</span>
    <span class="topbar-chip">eBay Banner Tool</span>
  </header>

  <div class="layout">

    <!-- ── Left Panel ── -->
    <aside class="panel">

      <!-- Step 1 -->
      <div class="section" id="sec1">
        <div class="section-head">
          <div class="step-badge" id="badge1">1</div>
          <div class="section-title">商品写真をアップロード</div>
          <div class="section-done-label">✓ 完了</div>
        </div>
        <div class="section-body">
          <div class="drop-zone" id="product-zone">
            <div class="dz-icon">🖼️</div>
            <div class="dz-title">ドラッグ＆ドロップ</div>
            <div class="dz-sub">またはクリックして選択 · JPG / PNG</div>
            <input type="file" id="product-input" accept="image/*">
          </div>
          <div class="file-chip" id="product-chip">
            <img id="product-thumb" src="" alt="">
            <div class="fc-info">
              <div class="fc-name" id="product-name"></div>
              <div class="fc-size" id="product-size"></div>
            </div>
            <button class="fc-change" id="product-change">変更</button>
          </div>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="section" id="sec2">
        <div class="section-head">
          <div class="step-badge" id="badge2">2</div>
          <div class="section-title">バナーを選択</div>
        </div>
        <div class="section-body">
          <div class="banner-grid">
            <div class="banner-opt selected" id="opt-default" onclick="selectBanner('default')">
              <div class="bo-check">✓</div>
              <img src="/static/banner.png" alt="デフォルト">
              <div class="bo-label">デフォルト</div>
            </div>
            <div class="banner-opt" id="opt-custom" onclick="document.getElementById('banner-input').click()">
              <div class="bo-check">✓</div>
              <div class="custom-ph" id="custom-ph">
                <div class="ph-icon">＋</div>
                <span>カスタム追加</span>
              </div>
              <img id="custom-banner-img" src="" alt="" style="display:none; height:60px; object-fit:cover; width:100%;">
              <div class="bo-label" id="custom-label">カスタム</div>
              <input type="file" id="banner-input" accept="image/*">
            </div>
          </div>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="section" id="sec3">
        <div class="section-head">
          <div class="step-badge">3</div>
          <div class="section-title">バナーサイズを調整</div>
        </div>
        <div class="section-body">
          <div class="slider-row">
            <div class="slider-label">バナーの高さ（全体比）</div>
            <div class="slider-num"><span id="ratio-display">22</span><small>%</small></div>
          </div>
          <input type="range" id="banner-ratio" min="10" max="40" value="22" step="1">
          <div class="slider-ticks">
            <span>小 10%</span>
            <span>標準 22%</span>
            <span>大 40%</span>
          </div>
        </div>
      </div>

    </aside>

    <!-- ── Right Preview ── -->
    <main class="preview-area">
      <div class="preview-header">
        <div class="preview-title-text">プレビュー</div>
        <div class="live-dot">リアルタイム更新</div>
      </div>

      <div class="preview-box" id="preview-box">
        <div class="preview-empty-state" id="preview-empty">
          <div class="es-icon">🖼️</div>
          <p>商品写真をアップロードしてください</p>
          <span>プレビューがここに表示されます</span>
        </div>
        <canvas id="preview-canvas"></canvas>
      </div>

      <button class="btn-primary" id="submit-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        ダウンロード（1000 × 1000 px）
      </button>

      <div class="loading" id="loading">
        <span class="spinner"></span>画像を生成しています...
      </div>
    </main>

  </div>

  <script>
    let productFile = null, bannerFile = null;
    let productDataUrl = null, bannerDataUrl = null;
    let useDefault = true;
    const defaultBannerSrc = '/static/banner.png';

    // スライダー復元
    const slider = document.getElementById('banner-ratio');
    const ratioDisplay = document.getElementById('ratio-display');
    const savedRatio = localStorage.getItem('bannerRatio');
    if (savedRatio) { slider.value = savedRatio; ratioDisplay.textContent = savedRatio; }
    syncSlider();

    slider.addEventListener('input', () => {
      ratioDisplay.textContent = slider.value;
      localStorage.setItem('bannerRatio', slider.value);
      syncSlider();
      updatePreview();
    });

    function syncSlider() {
      const pct = ((slider.value - slider.min) / (slider.max - slider.min) * 100).toFixed(1) + '%';
      slider.style.setProperty('--pct', pct);
    }

    // 商品写真
    const productZone = document.getElementById('product-zone');
    const productInput = document.getElementById('product-input');

    productZone.addEventListener('click', () => productInput.click());
    productZone.addEventListener('dragover', e => { e.preventDefault(); productZone.classList.add('drag-over'); });
    productZone.addEventListener('dragleave', () => productZone.classList.remove('drag-over'));
    productZone.addEventListener('drop', e => {
      e.preventDefault(); productZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f?.type.startsWith('image/')) setProduct(f);
    });
    productInput.addEventListener('change', () => { if (productInput.files[0]) setProduct(productInput.files[0]); });
    document.getElementById('product-change').addEventListener('click', () => productInput.click());

    function setProduct(file) {
      productFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        productDataUrl = e.target.result;
        document.getElementById('product-thumb').src = productDataUrl;
        document.getElementById('product-name').textContent = file.name;
        document.getElementById('product-size').textContent = (file.size / 1024).toFixed(0) + ' KB';
        productZone.style.display = 'none';
        document.getElementById('product-chip').style.display = 'flex';
        document.getElementById('sec1').classList.add('done');
        document.getElementById('badge1').textContent = '✓';
        updateSubmit();
        updatePreview();
      };
      reader.readAsDataURL(file);
    }

    // バナー選択
    function selectBanner(type) {
      if (type === 'default') {
        useDefault = true; bannerFile = null; bannerDataUrl = null;
        document.getElementById('opt-default').classList.add('selected');
        document.getElementById('opt-custom').classList.remove('selected');
      }
      updatePreview();
    }

    document.getElementById('banner-input').addEventListener('change', function() {
      if (!this.files[0]) return;
      bannerFile = this.files[0];
      useDefault = false;
      const reader = new FileReader();
      reader.onload = e => {
        bannerDataUrl = e.target.result;
        const img = document.getElementById('custom-banner-img');
        img.src = bannerDataUrl; img.style.display = 'block';
        document.getElementById('custom-ph').style.display = 'none';
        const n = bannerFile.name;
        document.getElementById('custom-label').textContent = n.length > 12 ? n.slice(0,10)+'…' : n;
        document.getElementById('opt-custom').classList.add('selected');
        document.getElementById('opt-default').classList.remove('selected');
        updatePreview();
      };
      reader.readAsDataURL(bannerFile);
    });

    // プレビュー
    function updatePreview() {
      const empty = document.getElementById('preview-empty');
      const canvas = document.getElementById('preview-canvas');
      if (!productDataUrl) { empty.style.display = 'flex'; canvas.style.display = 'none'; return; }

      empty.style.display = 'none';
      canvas.style.display = 'block';

      const SIZE = 600;
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      const ratio = parseInt(slider.value) / 100;
      const bannerH = Math.round(SIZE * ratio);
      const productH = SIZE - bannerH;

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, SIZE, SIZE);

      const pImg = new Image();
      pImg.onload = () => {
        ctx.drawImage(pImg, 0, 0, SIZE, productH);
        const src = useDefault ? defaultBannerSrc : bannerDataUrl;
        const bImg = new Image();
        bImg.crossOrigin = 'anonymous';
        bImg.onload = () => {
          ctx.drawImage(bImg, 0, productH, SIZE, bannerH);
          // 境界線
          ctx.strokeStyle = 'rgba(255,255,255,0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(0, productH); ctx.lineTo(SIZE, productH); ctx.stroke();
          // バッジ
          const label = slider.value + '%';
          ctx.font = '600 12px Inter, sans-serif';
          const tw = ctx.measureText(label).width;
          const bw = tw + 20, bh = 24, bx = SIZE - bw - 10, by = productH - bh - 10;
          ctx.fillStyle = 'rgba(26,115,232,0.9)';
          roundRect(ctx, bx, by, bw, bh, 6);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.fillText(label, bx + bw/2, by + 16);
        };
        bImg.src = src;
      };
      pImg.src = productDataUrl;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function updateSubmit() {
      document.getElementById('submit-btn').disabled = !productFile;
    }

    // ダウンロード
    document.getElementById('submit-btn').addEventListener('click', async () => {
      if (!productFile) return;
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('loading').style.display = 'block';

      const fd = new FormData();
      fd.append('image', productFile);
      fd.append('banner_ratio', slider.value);
      if (!useDefault && bannerFile) fd.append('banner', bannerFile);

      try {
        const res = await fetch('/process', { method: 'POST', body: fd });
        if (!res.ok) throw new Error();
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'ebay_listing.jpg'; a.click();
        URL.revokeObjectURL(url);
      } catch {
        alert('エラーが発生しました。もう一度お試しください。');
      } finally {
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('loading').style.display = 'none';
      }
    });
  </script>
</body>
</html>
